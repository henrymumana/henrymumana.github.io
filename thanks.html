<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Henry Umana</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>
    <div class="grid-overlay" aria-hidden="true"></div>
    <div class="floating-orb orb-one" aria-hidden="true"></div>
    <div class="floating-orb orb-two" aria-hidden="true"></div>

    <main class="container" id="thanks-content" hidden>
      <header class="top-bar top-bar-right">
        <nav aria-label="Primary navigation" class="top-nav">
          <ul class="tabs">
            <li><a href="https://henrymumana.github.io/">Home</a></li>
            <li><a href="contact.html?from=nav">Contact</a></li>
          </ul>
        </nav>
      </header>

      <section class="hero compact-hero card" aria-labelledby="thanks-heading">
        <h1 id="thanks-heading">Thank You!</h1>
        <p class="intro">I received your message and will get back to you soon.</p>
        <p>Your email was submitted successfully.</p>
        <p>
          <a href="https://henrymumana.github.io/">Return Home</a>
          &nbsp;|&nbsp;
          <a href="contact.html?from=nav">Send Another Message</a>
        </p>
      </section>

      <footer class="site-footer">
        <p class="copyright">&copy; 2026 Henry Umana</p>
      </footer>
    </main>

    <script>
      const cameFromForm = new URLSearchParams(window.location.search).get("from") === "form";
      const wasFormSubmitted = sessionStorage.getItem("contactFormSubmitted") === "true";
      const thanksContent = document.getElementById("thanks-content");

      if (!cameFromForm && !wasFormSubmitted) {
        window.location.replace("https://henrymumana.github.io/");
      } else {
        sessionStorage.removeItem("contactFormSubmitted");
        if (thanksContent) {
          thanksContent.hidden = false;
        }
      }
    </script>
  </body>
</html>
