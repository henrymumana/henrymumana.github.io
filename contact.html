<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Henry Umana</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>
    <div class="grid-overlay" aria-hidden="true"></div>
    <div class="floating-orb orb-one" aria-hidden="true"></div>
    <div class="floating-orb orb-two" aria-hidden="true"></div>

    <main class="container">
      <header class="top-bar top-bar-right">
        <nav aria-label="Primary navigation" class="top-nav">
          <ul class="tabs">
            <li><a href="https://henrymumana.github.io/">Home</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </header>

      <section class="hero compact-hero">
        <h1>Contact</h1>
        <p class="intro">Have a question or opportunity? Send me a message.</p>
      </section>

      <section class="contact card" aria-labelledby="contact-heading">
        <h2 id="contact-heading">Contact Me</h2>
        <p>Fill this out and I'll get your message by email.</p>
        <form action="https://formsubmit.co/henrymumana@gmail.com" method="POST" class="contact-form">
          <input type="hidden" name="_subject" value="New portfolio contact form message" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="https://henrymumana.github.io/thanks.html" />
          <input type="hidden" id="replyto" name="_replyto" value="" />

          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" required />

          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            maxlength="254"
            pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$"
            aria-describedby="email-help"
            required
          />
          <small id="email-help">Please enter a valid email address (example: name@email.com).</small>

          <label for="school">School / Company (Optional)</label>
          <input id="school" name="school_or_company" type="text" />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <script>
      const contactForm = document.querySelector(".contact-form");
      const emailField = document.querySelector("#email");
      const replyToField = document.querySelector("#replyto");

      const isValidEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(value);

      if (contactForm && emailField) {
        emailField.addEventListener("input", () => {
          emailField.value = emailField.value.trim();
          if (replyToField) {
            replyToField.value = emailField.value;
          }
          emailField.setCustomValidity("");
        });

        contactForm.addEventListener("submit", (event) => {
          emailField.value = emailField.value.trim();
          if (replyToField) {
            replyToField.value = emailField.value;
          }

          if (!isValidEmail(emailField.value)) {
            emailField.setCustomValidity("Please enter a valid email address before submitting.");
            emailField.reportValidity();
            event.preventDefault();
          }
        });
      }
    </script>
  </body>
</html>
